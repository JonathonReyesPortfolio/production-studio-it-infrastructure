version: '3'
services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm_genos
    ports:
      - "80:80"
      - "443:443"
      - "81:81"  # UI access
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - genos_net

networks:
  genos_net:
    external: true
